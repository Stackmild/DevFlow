# regression-known-issues.yaml
# DevFlow 回归检查已知问题登记表
# 用途：后续跑 regression-check 时区分"新增问题"与"已知历史包袱"
# 不要把当前真实问题误登记为 accepted_legacy
#
# classification 枚举:
#   legacy           — 历史遗留，早期协议版本的正常行为，不代表当前缺口
#   accepted_exception — 有意识接受的例外（附说明）
#   data_gap         — coverage 不足，无法判定（不是真正的违规）
#
# status 枚举: open | accepted | fixed

known_issues:

  # ── Category B: 历史遗留 ────────────────────────────────────────────────────

  - id: "KI-001"
    task_id: "ai-daily-hub-d001-20260322"
    assertion_id: "gate-1-before-phase-d"
    classification: "legacy"
    reason: |
      v1.5-flat era hotfix 任务。早期 hotfix 流程未强制执行 Gate 1 方向审查，
      也没有写 gate-1-skip 记录。当时的操作规范不要求 Gate 1 文件。
    introduced_by: "pre-v4.3 hotfix convention"
    status: "accepted"
    first_seen: "2026-03-24"

  - id: "KI-002"
    task_id: "ai-daily-hub-lastrefresh-20260321"
    assertion_id: "gate-1-before-phase-d"
    classification: "legacy"
    reason: |
      pre-v4 任务，使用旧版 gate 命名（gate-b = 最终验收 gate）。
      该任务确实通过了完整的 gate-b（Final Gate），但没有独立的 gate-1 文件。
      v4.0 前，gate-1 文件不是强制要求。
    introduced_by: "pre-v4 gate naming convention (gate-b = acceptance)"
    status: "accepted"
    first_seen: "2026-03-24"

  - id: "KI-003"
    task_id: "news-digest-rss-redesign-20260323"
    assertion_id: "gate-1-before-phase-d"
    classification: "data_gap"
    reason: |
      state store 不一致：current_phase=phase_f 且有 gate-3 ACCEPT，
      但 events.jsonl 只记录了 Phase A/B，无 phase_entered(phase_d)。
      任务可能在 events 记录不完整的时期被标记为完成。
      gate-1 缺失可能是 events 遗漏，而非真正跳过。
      分类为 data_gap（无法区分真实违规与记录不完整）。
    introduced_by: "incomplete state recording in Mar 2026 era tasks"
    status: "accepted"
    first_seen: "2026-03-24"

